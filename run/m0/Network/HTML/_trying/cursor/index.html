<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation Server</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            background-color: #f5f5f5;
            border-right: 1px solid #ddd;
            min-width: 200px;
            max-width: 400px;
            width: 250px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .sidebar-header {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            background-color: #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-controls {
            display: flex;
            gap: 5px;
        }

        .btn {
            padding: 5px 10px;
            border: 1px solid #ccc;
            background-color: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .btn:hover {
            background-color: #f0f0f0;
        }

        .toggle-btn {
            position: absolute;
            right: -20px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 40px;
            background-color: #e0e0e0;
            border: 1px solid #ddd;
            border-left: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background-color: transparent;
            cursor: col-resize;
        }

        .resize-handle:hover {
            background-color: #007bff;
        }

        .tree-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .tree-item {
            margin: 2px 0;
        }

        .tree-content {
            display: flex;
            align-items: center;
            padding: 5px;
            cursor: pointer;
            border-radius: 3px;
        }

        .tree-content:hover {
            background-color: #e9ecef;
        }

        .tree-content.active {
            background-color: #007bff;
            color: white;
        }

        .tree-toggle {
            width: 16px;
            height: 16px;
            margin-right: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
        }

        .tree-toggle.expanded::before {
            content: "▼";
        }

        .tree-toggle.collapsed::before {
            content: "▶";
        }

        .tree-toggle.leaf {
            width: 16px;
            margin-right: 5px;
        }

        .tree-children {
            margin-left: 20px;
            display: none;
        }

        .tree-children.expanded {
            display: block;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fff;
        }

        .document-placeholder {
            color: #666;
            font-style: italic;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="toggle-btn" id="toggleBtn">◀</div>
        
        <div class="sidebar-header">
            <h3>-zero</h3>
            <div class="sidebar-controls">
                <button class="btn" id="collapseAll">Collapse</button>
                <button class="btn" id="expandAll">Expand</button>
            </div>
        </div>
        
        <div class="tree-container" id="treeContainer">
            <!-- Tree will be generated by JavaScript -->
        </div>
    </div>
    
    <div class="main-content" id="mainContent">
        <div class="document-placeholder">
            Select an item from the left panel to load the document
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
